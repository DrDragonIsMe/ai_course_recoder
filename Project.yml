name: RecordCourses
options:
  bundleIdPrefix: com.recordcourses
  deploymentTarget: "13.0"
  xcodeVersion: "14.0"
  generateEmptyDirectories: true
  preGenCommand: ""

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  RecordCourses:
    type: application
    platform: macOS
    settings:
      INFOPLIST_KEY_LSMinimumSystemVersion: "12.0"
      INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 RecordCourses. All rights reserved."
    sources:
      - path: RecordCourses
        type: group
    entitlements:
      path: RecordCourses/RecordCourses.entitlements
    info:
      path: RecordCourses/Info.plist
      properties:
        LSApplicationCategoryType: public.app-category.productivity
        NSCameraUsageDescription: "RecordCourses needs access to your camera to record your face while you teach."
        NSMicrophoneUsageDescription: "RecordCourses needs access to your microphone to record your voice."
        NSRequiresAquaSystemAppearance: false
    dependencies: []

  RecordCoursesTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: RecordCoursesTests
    dependencies:
      - target: RecordCourses
